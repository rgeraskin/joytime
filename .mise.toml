[tools]
go = "1.23.2"
golangci-lint = "latest"

[env]
APP_NAME = "joytime"
BUILD_DIR = "./build"
DEBUG = "1"
_.file = ".env"

# Development tasks
[tasks]

# === Build and Run ===
[tasks.build]
description = "Build application"
run = """
echo '🔨 Building application...'
mkdir -p $BUILD_DIR
go build -o $BUILD_DIR/$APP_NAME ./cmd
echo '✅ Application built: $BUILD_DIR/$APP_NAME'
"""

[tasks.run]
description = "Start application"
depends = ["build"]
run = """
echo '🚀 Starting application...'
$BUILD_DIR/$APP_NAME
"""

# === Testing ===
[tasks.test]
description = "Run all tests"
depends = ["db:clean"]
run = """
echo '🐘 Starting PostgreSQL...'
mise run db:up
sleep 5
echo '🧪 Running tests...'
go test -v ./...
"""

# [tasks."test-integration"]
# description = "Run API integration tests"
# run = """
# echo '🌐 Running integration tests...'
# go test -v ./internal/api -run TestFullAPIWorkflow
# """

[tasks."test-coverage"]
description = "Run tests with coverage"
run = """
echo '📊 Analyzing test coverage...'
go test -coverprofile=coverage.out ./...
go tool cover -html=coverage.out -o coverage.html
echo '📈 Report created: coverage.html'
"""

# === Database ===
[tasks."db:up"]
description = "Start PostgreSQL in Docker"
run = """
echo '🐘 Starting PostgreSQL...'
docker compose up -d postgres
echo "✅ PostgreSQL started on port $PGPORT"
"""

[tasks."db:down"]
description = "Stop PostgreSQL"
run = """
echo '🛑 Stopping PostgreSQL...'
docker compose down postgres
"""

[tasks."db:clean"]
description = "Stop PostgreSQL and remove volumes"
run = """
echo '🛑 Stopping PostgreSQL and removing volumes...'
docker compose down -v postgres
"""

[tasks."db:fill"]
description = "Start application with DB fill"
depends = ["build", "db:up"]
run = """
echo '🚀 Starting application to fill DB:..'
$BUILD_DIR/$APP_NAME -fill
"""

[tasks."db:logs"]
description = "Show PostgreSQL logs"
run = "docker compose logs -f postgres"

[tasks."db:shell"]
description = "Connect to PostgreSQL shell"
run = "docker compose exec -it postgres psql -U ${PGUSER} -d ${PGDATABASE}"

[tasks."db:shell-pipe"]
description = "Connect to PostgreSQL shell and pipe to it"
run = "docker compose exec -T postgres psql -U ${PGUSER} -d ${PGDATABASE}"

[tasks."db:reset"]
description = "Reset DB and fill with test data"
run = """
mise run db:down
mise run db:fill
"""

# === Development ===
[tasks."dev-deps"]
description = "Install development dependencies"
run = """
echo '📦 Installing dependencies...'
go mod download
go mod tidy
echo '✅ Dependencies installed'
"""

[tasks.clean]
description = "Clean build artifacts"
run = """
echo '🧹 Cleaning...'
rm -rf $BUILD_DIR
rm -f $APP_NAME
rm -f coverage.out coverage.html
echo '✅ Cleaning completed'
"""

[tasks.fmt]
description = "Format code"
run = """
echo '💅 Formatting code...'
go fmt ./...
go mod tidy
"""

[tasks.lint]
description = "Check code with linter"
run = """
echo '🔍 Checking code...'
go vet ./...
golangci-lint run
"""

# === Environment Setup ===
[tasks."setup-env"]
run = """
echo '⚙️  Creating .env file...'
cat > .env << 'EOF'
# Telegram Bot Token (get from @BotFather)
TOKEN=your_telegram_bot_token_here

# PostgreSQL settings
PGHOST=localhost
PGPORT=5432
PGUSER=joytime
PGPASSWORD=password
PGDATABASE=joytime

# Debug mode
DEBUG=1
EOF
echo "⚠️  Don't forget to update settings in .env file!"
"""

# === Complex Tasks ===
[tasks.dev]
description = "Start full development environment"
depends = ["dev-deps", "db:fill"]
run = """
echo '🚀 Starting development environment...'
"""

[tasks.ci]
description = "Run CI checks"
run = """
echo '🤖 Running CI checks...'
mise run fmt
mise run lint
mise run test
echo '✅ All checks passed'
"""

[tasks."full-reset"]
description = "Full project reset"
run = """
echo '🔄 Full project reset...'
mise run clean
mise run db:reset
mise run dev
"""

# === Documentation ===
[tasks.docs]
description = "Generate API documentation"
run = """
echo '📚 Generating documentation...'
mkdir -p docs
cd cmd && go doc -all > ../docs/api.txt && echo '✅ Documentation updated'
"""
