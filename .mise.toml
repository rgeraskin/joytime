# Конфигурация инструментов разработки
[tools]
go = "1.23.2"

# Переменные окружения
[env]
APP_NAME = "joytime"
BUILD_DIR = "./build"
DEBUG = "1"
# Автоматически загружаем переменные из .env файла
_.file = ".env"

# Задачи разработки
[tasks]

# === Сборка и запуск ===
[tasks.build]
description = "Build application"
run = """
echo '🔨 Building application...'
mkdir -p $BUILD_DIR
go build -o $BUILD_DIR/$APP_NAME ./cmd
echo '✅ Application built: $BUILD_DIR/$APP_NAME'
"""

[tasks.run]
description = "Start application"
depends = ["build"]
run = """
echo '🚀 Starting application...'
$BUILD_DIR/$APP_NAME
"""

[tasks."run-fill"]
description = "Start application with DB fill"
depends = ["build"]
run = """
echo '🚀 Starting application with DB fill...'
$BUILD_DIR/$APP_NAME -fill
"""

[tasks.fill]
description = "Fill DB with test data"
depends = ["build"]
run = """
echo '📊 Filling DB with test data...'
$BUILD_DIR/$APP_NAME -fill
"""

# === Тестирование ===
[tasks.test]
description = "Run all tests"
run = """
echo '🧪 Running tests...'
go test -v ./...
"""

[tasks."test-integration"]
description = "Run API integration tests"
run = """
echo '🌐 Running integration tests...'
go test -v ./internal/api -run TestFullAPIWorkflow
"""

[tasks."test-tokens"]
description = "Run token operations tests"
run = """
echo '💰 Testing token operations...'
go test -v ./internal/api -run TestTokenOperations
"""

[tasks."test-unit"]
description = "Run unit tests only"
run = "go test -v ./internal/..."

[tasks."test-coverage"]
description = "Run tests with coverage"
run = """
echo '📊 Analyzing test coverage...'
go test -coverprofile=coverage.out ./...
go tool cover -html=coverage.out -o coverage.html
echo '📈 Report created: coverage.html'
"""

# === База данных ===
[tasks."db.up"]
description = "Start PostgreSQL in Docker"
run = """
echo '🐘 Starting PostgreSQL...'
docker run -d -p ${PGPORT}:5432 -e POSTGRES_DB=${PGDATABASE} -e POSTGRES_USER=${PGUSER} -e POSTGRES_PASSWORD=${PGPASSWORD} --name ${POSTGRES_CONTAINER_NAME} ${POSTGRES_IMAGE} || docker start ${POSTGRES_CONTAINER_NAME}
echo "✅ PostgreSQL started on port $PGPORT"
"""

[tasks."db.down"]
description = "Stop PostgreSQL"
run = """
echo '🛑 Stopping PostgreSQL...'
docker stop ${POSTGRES_CONTAINER_NAME} || true
docker rm ${POSTGRES_CONTAINER_NAME} || true
"""

[tasks."db.logs"]
description = "Show PostgreSQL logs"
run = "docker logs -f ${POSTGRES_CONTAINER_NAME}"

[tasks."db.shell"]
description = "Connect to PostgreSQL shell"
run = "docker exec -it ${POSTGRES_CONTAINER_NAME} psql -U ${PGUSER} -d ${PGDATABASE}"

[tasks."db.reset"]
description = "Reset DB and fill with test data"
depends = ["db.down", "db.up"]
run = """
echo '⏳ Waiting for PostgreSQL to start...'
sleep 3
mise run fill
"""

# === Docker compose (альтернативный способ) ===
[tasks."docker.up"]
description = "Start all services via docker-compose"
run = """
echo '🐳 Starting services...'
docker-compose up -d postgres
"""

[tasks."docker.down"]
description = "Stop all services"
run = """
echo '🛑 Stopping services...'
docker-compose down
"""

[tasks."docker.logs"]
description = "Show all services logs"
run = "docker-compose logs -f"

# === Разработка ===
[tasks."dev-deps"]
description = "Install development dependencies"
run = """
echo '📦 Installing dependencies...'
go mod download
go mod tidy
echo '✅ Dependencies installed'
"""

[tasks.clean]
description = "Clean build artifacts"
run = """
echo '🧹 Cleaning...'
rm -rf $BUILD_DIR
rm -f $APP_NAME
rm -f coverage.out coverage.html
echo '✅ Cleaning completed'
"""

[tasks.fmt]
description = "Format code"
run = """
echo '💅 Formatting code...'
go fmt ./...
go mod tidy
"""

[tasks.lint]
description = "Check code with linter"
run = """
echo '🔍 Checking code...'
go vet ./...
golangci-lint run || echo '⚠️  Install golangci-lint for full checks'
"""

# === Настройка окружения ===
[tasks."setup-env"]
run = """
echo '⚙️  Creating .env file...'
cat > .env << 'EOF'
# Telegram Bot Token (get from @BotFather)
TOKEN=your_telegram_bot_token_here

# PostgreSQL settings
PGHOST=localhost
PGPORT=5432
PGUSER=joytime
PGPASSWORD=password
PGDATABASE=joytime

# Docker PostgreSQL settings
POSTGRES_CONTAINER_NAME=joytime-postgres
POSTGRES_IMAGE=postgres:15-alpine

# Debug mode
DEBUG=1
EOF
echo "⚠️  Don't forget to update settings in .env file!"
"""

# === Комплексные задачи ===
[tasks.dev]
description = "Start full development environment"
depends = ["dev-deps", "db.up"]
run = """
echo '🚀 Starting development environment...'
sleep 2
mise run run-fill
"""

[tasks.ci]
description = "Run CI checks"
run = """
echo '🤖 Running CI checks...'
mise run fmt
mise run lint
mise run test
echo '✅ All checks passed'
"""

[tasks."full-reset"]
description = "Full project reset"
run = """
echo '🔄 Full project reset...'
mise run clean
mise run db.down
mise run dev-deps
mise run db.up
sleep 3
mise run dev
"""

# === Документация ===
[tasks.docs]
description = "Generate API documentation"
run = """
echo '📚 Generating documentation...'
go doc -all > docs/api.txt || echo 'Documentation saved to docs/api.txt'
echo '✅ Documentation updated'
"""

# === Утилиты ===
[tasks.help]
description = "Show all available commands"
run = """
echo '📋 Available mise commands:'
mise tasks
"""
