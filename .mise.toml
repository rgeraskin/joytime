[tools]
air = "1.64.5"
go = "1.23.2"
golangci-lint = "latest"
"ubi:goreleaser/goreleaser" = "2.12.5"

[env]
APP_NAME = "joytime"
BUILD_DIR = "./build"
DEBUG = "1"
_.file = ".env"

# Development tasks
[tasks]

# === Build and Run ===
[tasks.build]
description = "Build application"
run = """
echo '🔨 Building application...'
mkdir -p $BUILD_DIR
go build -o $BUILD_DIR/$APP_NAME ./cmd
echo '✅ Application built: $BUILD_DIR/$APP_NAME'
"""

[tasks.run]
description = "Start application"
depends = ["build"]
run = """
echo '🚀 Starting application...'
$BUILD_DIR/$APP_NAME
"""

# === Testing ===
[tasks.test]
description = "Run all tests"
depends = ["db:clean"]
run = """
echo '🐘 Starting PostgreSQL...'
mise run db:up
sleep 5
echo '🧪 Running tests...'
go test -v ./...
"""

# [tasks."test-integration"]
# description = "Run API integration tests"
# run = """
# echo '🌐 Running integration tests...'
# go test -v ./internal/api -run TestFullAPIWorkflow
# """

[tasks."test-coverage"]
description = "Run tests with coverage"
run = """
echo '📊 Analyzing test coverage...'
go test -coverprofile=coverage.out ./...
go tool cover -html=coverage.out -o coverage.html
echo '📈 Report created: coverage.html'
"""

# === Database ===
[tasks."db:up"]
description = "Start PostgreSQL in Docker"
run = """
echo '🐘 Starting PostgreSQL...'
docker compose up -d postgres
echo "✅ PostgreSQL started on port $PGPORT"
"""

[tasks."db:down"]
description = "Stop PostgreSQL"
run = """
echo '🛑 Stopping PostgreSQL...'
docker compose down postgres
"""

[tasks."db:clean"]
description = "Stop PostgreSQL and remove volumes"
run = """
echo '🛑 Stopping PostgreSQL and removing volumes...'
docker compose down -v postgres
"""

[tasks."db:fill"]
description = "Start application with DB fill"
depends = ["build", "db:up"]
run = """
echo '🚀 Starting application to fill DB...'
$BUILD_DIR/$APP_NAME -fill
"""

[tasks."db:logs"]
description = "Show PostgreSQL logs"
run = "docker compose logs -f postgres"

[tasks."db:shell"]
description = "Connect to PostgreSQL shell"
run = "docker compose exec -it postgres psql -U ${PGUSER} -d ${PGDATABASE}"

[tasks."db:shell-pipe"]
description = "Connect to PostgreSQL shell and pipe to it"
run = "docker compose exec -T postgres psql -U ${PGUSER} -d ${PGDATABASE}"

[tasks."db:dump"]
description = "Dump database to file"
run = """
#!/usr/bin/env bash
DUMP_FILE="${1:-dump.sql}"
echo "🐘 Dumping database to $DUMP_FILE..."
docker compose exec -T postgres pg_dump -U ${PGUSER} -d ${PGDATABASE} > "$DUMP_FILE"
echo "✅ Database dumped to $DUMP_FILE"
"""

[tasks."db:restore"]
description = "Restore database from file"
run = """
#!/usr/bin/env bash
DUMP_FILE="${1:-dump.sql}"
if [ ! -f "$DUMP_FILE" ]; then
  echo "❌ File not found: $DUMP_FILE"
  exit 1
fi
echo "🐘 Restoring database from $DUMP_FILE..."
docker compose exec -T postgres psql -U ${PGUSER} -d ${PGDATABASE} -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
docker compose exec -T postgres psql -U ${PGUSER} -d ${PGDATABASE} < "$DUMP_FILE"
echo "✅ Database restored from $DUMP_FILE"
"""

[tasks."db:reset"]
description = "Reset DB and fill with test data"
run = """
mise run db:down
mise run db:fill
"""

# === Development ===
[tasks."dev-deps"]
description = "Install development dependencies"
run = """
echo '📦 Installing dependencies...'
go mod download
go mod tidy
echo '✅ Dependencies installed'
"""

[tasks.clean]
description = "Clean build artifacts"
run = """
echo '🧹 Cleaning...'
rm -rf $BUILD_DIR
rm -f $APP_NAME
rm -f coverage.out coverage.html
echo '✅ Cleaning completed'
"""

[tasks.fmt]
description = "Format code"
run = """
echo '💅 Formatting code...'
go fmt ./...
go mod tidy
"""

[tasks.lint]
description = "Check code with linter"
run = """
echo '🔍 Checking code...'
go vet ./...
golangci-lint run
"""

# === Release ===
# Build and publish a release-candidate Docker image to Docker Hub from your
# machine, reusing the exact same goreleaser/ko config as CI. Intended for
# testing an image before merging to master. It pushes only the RC version tag
# (never `latest`) and does NOT create a GitHub release.
#
#   mise run release-rc 0.3.0-rc.1
#
# Requires `docker login` to Docker Hub beforehand. GITHUB_TOKEN is not needed.
[tasks."release-rc"]
description = "Build & push a release-candidate image to Docker Hub (same config as CI). Usage: mise run release-rc <version>"
run = """
#!/usr/bin/env bash
set -euo pipefail

VERSION="${1:-}"
if [ -z "$VERSION" ]; then
  echo "❌ Usage: mise run release-rc <version>   (e.g. 0.3.0-rc.1)"
  exit 1
fi
VERSION="${VERSION#v}"   # tolerate a leading 'v'

# Safety: this task is for release candidates only. A non-prerelease version
# would move the 'latest' tag, which must only happen from CI on a real tag.
case "$VERSION" in
  *-*) ;;
  *)
    echo "❌ '$VERSION' is not a prerelease. Use an RC suffix, e.g. ${VERSION}-rc.1"
    echo "   (final releases are published by CI on a vX.Y.Z git tag.)"
    exit 1
    ;;
esac

if ! docker info >/dev/null 2>&1; then
  echo "❌ Docker daemon is not running."
  exit 1
fi
echo "🔑 Ensure you're logged in to Docker Hub (docker login) for rgeraskin/joytime."

echo "🐳 Building & pushing rgeraskin/joytime:$VERSION (no 'latest', no GitHub release)..."
GORELEASER_CURRENT_TAG="v$VERSION" \
GORELEASER_SKIP_GH_RELEASE=true \
  goreleaser release --clean --skip=validate

echo "✅ Pushed rgeraskin/joytime:$VERSION"
echo "   Test it: docker run --rm --env-file .env rgeraskin/joytime:$VERSION"
"""

# === Environment Setup ===
[tasks."setup-env"]
run = """
echo '⚙️  Creating .env file...'
cat > .env << 'EOF'
# Telegram Bot Token (get from @BotFather)
TOKEN=your_telegram_bot_token_here

# PostgreSQL settings
PGHOST=localhost
PGPORT=5432
PGUSER=joytime
PGPASSWORD=password
PGDATABASE=joytime

# Debug mode
DEBUG=1
EOF
echo "⚠️  Don't forget to update settings in .env file!"
"""

# === Complex Tasks ===
[tasks.dev]
description = "Start full development environment"
depends = ["dev-deps", "db:fill"]
run = """
echo '🚀 Starting development environment...'
"""

[tasks.ci]
description = "Run CI checks"
run = """
echo '🤖 Running CI checks...'
mise run fmt
mise run lint
mise run test
echo '✅ All checks passed'
"""

[tasks."full-reset"]
description = "Full project reset"
run = """
echo '🔄 Full project reset...'
mise run clean
mise run db:reset
mise run dev
"""

# === Documentation ===
[tasks.docs]
description = "Generate API documentation"
run = """
echo '📚 Generating documentation...'
mkdir -p docs
cd cmd && go doc -all > ../docs/api.txt && echo '✅ Documentation updated'
"""
