# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2
git:
  ignore_tags:
    - helm-*
before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_ {{- title .Os }}_ {{- if eq .Arch "amd64" }}x86_64 {{- else if eq .Arch "386" }}i386 {{- else }}{{ .Arch }}{{ end }} {{- if .Arm }}v{{ .Arm }}{{ end }}
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
release:
  # Allow local publishing of images without creating a GitHub release
  # (the `release-rc` mise task sets GORELEASER_SKIP_GH_RELEASE=true). CI leaves
  # it unset, so real tag pushes still create the GitHub release.
  disable: '{{ envOrDefault "GORELEASER_SKIP_GH_RELEASE" "false" }}'
kos:
  - repositories:
      - rgeraskin/joytime
    tags:
      - "{{.Version}}"
      # Only move `latest` for final releases — never for prereleases (e.g. RCs),
      # so a release candidate cannot clobber the `latest` tag.
      - "{{ if not .Prerelease }}latest{{ end }}"
    bare: true
    platforms:
      - linux/amd64
      - linux/arm64
