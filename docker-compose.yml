services:
  postgres:
    image: postgres:15-alpine
    container_name: joytime-postgres
    environment:
      POSTGRES_DB: joytime
      POSTGRES_USER: joytime
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joytime -d joytime"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: